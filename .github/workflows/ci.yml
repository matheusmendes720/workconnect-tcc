name: CI / CD - Next.js & Docusaurus

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Docusaurus and Sync
      run: npm run docs:sync:ci

    - name: Build Next.js
      run: npm run build

    - name: Lint Next.js
      run: npm run lint
